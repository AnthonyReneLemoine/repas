<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau des dîners</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="topbar">
      <header class="header">
        <h1>🍽️ Tableau des dîners</h1>
        <p>Planifie tes repas de la semaine en glisser-déposer.</p>
      </header>

      <div class="auth-panel">
        <section class="auth card" id="authCard">
          <h2>Connexion</h2>
          <form id="authForm" class="auth-form">
            <input id="authEmail" type="email" placeholder="Email" required />
            <input id="authPassword" type="password" placeholder="Mot de passe" required minlength="6" />
            <div class="auth-actions">
              <button type="submit">Se connecter</button>
              <button id="registerBtn" type="button" class="action">Créer un compte</button>
            </div>
          </form>
          <p id="authMessage" class="auth-message"></p>
        </section>

        <section class="session card hidden" id="sessionCard">
          <p>Connecté avec <strong id="userEmail"></strong></p>
          <button id="logoutBtn" class="action delete" type="button">Se déconnecter</button>
        </section>
      </div>
    </div>

    <main class="layout hidden" id="appLayout">
      <section class="planner card">
        <div class="planner-top-row">
          <h2>Planning</h2>
          <button id="resetWeekBtn" class="action delete" type="button">Reset semaine</button>
        </div>
        <div id="weekTabs" class="week-tabs">
          <button type="button" class="week-tab is-active" data-week="week1">Semaine 1</button>
          <button type="button" class="week-tab" data-week="week2">Semaine 2</button>
        </div>
        <div id="daysBoard" class="days-board"></div>
      </section>

      <section class="meals card">
        <div class="meals-title-row">
          <h2>Repas</h2>
          <label class="toggle">
            <input id="showArchived" type="checkbox" />
            Voir archivés
          </label>
        </div>

        <input id="mealSearch" type="search" placeholder="Rechercher une fiche repas..." />

        <form id="mealForm" class="meal-form">
          <p id="mealMessage" class="meal-message"></p>
          <input id="mealName" name="name" type="text" placeholder="Nom du repas (ex : Nouilles sautées)" required />
          <textarea id="mealNote" name="note" rows="2" placeholder="Note facultative"></textarea>
          <button type="submit">Ajouter</button>
        </form>

        <ul id="mealsList" class="meals-list"></ul>
      </section>
    </main>

    <dialog id="configDialog">
      <form method="dialog" id="configForm" class="config-form">
        <h3>Configuration Firebase</h3>
        <p>Colle la configuration Firebase Web (objet JSON ou bloc <code>firebaseConfig</code>).</p>
        <textarea id="firebaseConfigInput" rows="10" placeholder='{"apiKey":"...", "projectId":"..."}' required></textarea>
        <menu>
          <button value="cancel">Annuler</button>
          <button id="saveConfigBtn" value="default">Enregistrer</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
